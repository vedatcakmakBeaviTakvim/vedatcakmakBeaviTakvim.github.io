<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Beavi">
<meta name="theme-color" content="#0d1b2a">
<title>Beavi – Beyanname Takvimi</title>
<style>
  :root {
    --bg:#0d1b2a; --bg2:#0f2133; --kart:#112640; --brd:#1e3a5f;
    --t1:#e8f0fe; --t2:#7a9cc4; --t3:#4a7099;
    --acbg:#1c0f00; --acbar:#ff6b00; --actxt:#ff8c00;
    --ykbg:#0d1e0d; --ykbar:#22c55e; --yktxt:#4ade80;
    --mavi:#3b82f6; --ysl:#22c55e; --kir:#ef4444;
    --sari:#f5c518; --r:12px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{font-size:16px;}
  body{background:var(--bg);color:var(--t1);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    min-height:100dvh;
    padding-bottom:max(env(safe-area-inset-bottom),16px);
    overflow-x:hidden;}

  /* HEADER */
  .hdr{position:sticky;top:0;z-index:99;background:var(--bg2);
    border-bottom:2px solid var(--brd);
    padding:12px 14px 12px;
    padding-top:max(env(safe-area-inset-top),12px);
    display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .lw{display:flex;align-items:center;gap:10px;}
  .lb{width:44px;height:44px;flex-shrink:0;display:block;}
  .lt h1{font-size:18px;font-weight:700;color:var(--t1);line-height:1.25;border-bottom:2px solid #f49e0b;padding-bottom:2px;display:inline-block;}
  .lt small{font-size:10px;font-weight:500;color:var(--t2);letter-spacing:0.5px;display:block;}
  .hbs{display:flex;gap:8px;align-items:center;}
  .ib{width:36px;height:36px;border-radius:18px;border:1px solid var(--brd);
    background:transparent;color:var(--t2);font-size:17px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .ib:active{background:var(--kart);}
  .ib.aon{border-color:var(--acbar);background:#1c0f00;color:var(--actxt);animation:blink 1.4s ease-in-out infinite;}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 12px 0;}
  .stat{background:var(--kart);border:1px solid var(--brd);border-radius:var(--r);
    padding:13px 8px 11px;text-align:center;position:relative;overflow:hidden;}
  .stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .sa::before{background:var(--kir);} .sb::before{background:var(--mavi);} .ss::before{background:var(--ysl);}
  .sn{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px;min-height:34px;display:flex;align-items:center;justify-content:center;}
  .sa .sn{color:var(--kir);} .sb .sn{color:var(--mavi);}
  .ss .sn{color:var(--ysl);font-size:12px;line-height:1.2;word-break:break-word;}
  .sl{font-size:8.5px;font-weight:600;letter-spacing:1.4px;color:var(--t3);text-transform:uppercase;}

  /* BANNER */
  .bnr{display:none;margin:10px 12px 0;background:var(--acbg);border:1px solid var(--acbar);
    border-radius:var(--r);padding:10px 12px;align-items:center;gap:10px;}
  .bnr.show{display:flex;}
  .bt{flex:1;font-size:12px;color:var(--actxt);font-weight:600;line-height:1.4;}
  .bx{background:transparent;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:0 2px;line-height:1;}

  /* SECTION HEADER */
  .shdr{display:flex;align-items:center;justify-content:space-between;padding:16px 12px 8px;}
  .stitle{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t3);text-transform:uppercase;}
  .rbtn{background:transparent;border:1px solid var(--brd);border-radius:18px;color:var(--t2);
    font-size:11px;font-family:inherit;padding:5px 13px;cursor:pointer;
    display:flex;align-items:center;gap:5px;transition:background .15s;}
  .rbtn:active{background:var(--kart);}

  /* KARTLAR */
  .liste{padding:0 12px 20px;display:flex;flex-direction:column;gap:7px;}

  /* BUGÜN */
  .k0{background:#1a0000;border:1.5px solid #ef4444;border-radius:var(--r);padding:12px 14px;text-align:center;}
  .k0 .badge{font-size:10px;font-weight:800;color:#ef4444;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
  .k0 .ad{font-size:14px;font-weight:700;color:#fca5a5;margin-bottom:2px;}
  .k0 .nt{font-size:9px;color:#b45151;font-style:italic;}

  /* ACİL 1-3 gün — TURUNCU */
  .k1{background:var(--acbg);border-top:1px solid #2a1500;border-right:1px solid #2a1500;
    border-bottom:1px solid #2a1500;border-left:4px solid var(--acbar);
    border-radius:var(--r);padding:11px 13px;
    display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .k1 .badge{font-size:9px;font-weight:700;color:var(--actxt);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:3px;}
  .k1 .ad{font-size:13px;font-weight:700;color:#ffe0b2;margin-bottom:2px;}
  .k1 .tr{font-size:10px;color:#b36000;}
  .k1 .nt{font-size:9px;color:#8a4e00;margin-top:2px;font-style:italic;}
  .k1 .sayac{text-align:center;flex-shrink:0;}
  .k1 .num{font-size:32px;font-weight:900;color:var(--acbar);line-height:1;}
  .k1 .lbl{font-size:8px;font-weight:700;color:var(--actxt);letter-spacing:1px;text-transform:uppercase;}

  /* YAKLASAN 4-7 gün — YEŞİL */
  .k2{background:var(--ykbg);border-top:1px solid #0a2e0a;border-right:1px solid #0a2e0a;
    border-bottom:1px solid #0a2e0a;border-left:3px solid var(--ykbar);
    border-radius:var(--r);padding:10px 13px;
    display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .k2 .badge{font-size:9px;font-weight:700;color:var(--yktxt);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:3px;}
  .k2 .ad{font-size:12px;font-weight:700;color:#d1fae5;margin-bottom:2px;}
  .k2 .tr{font-size:10px;color:#166534;}
  .k2 .nt{font-size:9px;color:#0f5132;margin-top:2px;font-style:italic;}
  .k2 .sayac{text-align:center;flex-shrink:0;}
  .k2 .num{font-size:26px;font-weight:800;color:var(--yktxt);line-height:1;}
  .k2 .lbl{font-size:8px;color:var(--yktxt);letter-spacing:1px;text-transform:uppercase;}

  /* NORMAL 8+ gün */
  .k3{background:var(--kart);border:1px solid var(--brd);border-radius:var(--r);
    padding:9px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .k3 .ad{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px;}
  .k3 .tr{font-size:10px;color:var(--t3);}
  .k3 .nt{font-size:9px;color:var(--t3);margin-top:2px;font-style:italic;opacity:.75;}
  .k3 .sayac{text-align:center;flex-shrink:0;}
  .k3 .num{font-size:20px;font-weight:700;color:var(--t2);}
  .k3 .lbl{font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;}

  .bos{text-align:center;padding:40px 16px;color:var(--t3);font-size:13px;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
  .blink{animation:blink 1s ease-in-out infinite;}
  @media(max-width:360px){.sn{font-size:22px;}.k1 .num{font-size:26px;}.ss .sn{font-size:11px;}}
</style>
</head>

var AYLAR = ['Oca','Sub','Mar','Nis','May','Haz','Tem','Agu','Eyl','Eki','Kas','Ara'];
var GUNLER = ['Paz','Pzt','Sal','Car','Per','Cum','Cmt'];

function parseD(s) {
  var p = s.split('-');
  return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
}

function dStr(d) {
  return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
}

function bugun() {
  var d = new Date();
  d.setHours(0,0,0,0);
  return d;
}

function kalanGun(d) {
  return Math.round((d - bugun()) / 86400000);
}

function fmtT(d) {
  return d.getDate() + ' ' + AYLAR[d.getMonth()] + ' (' + GUNLER[d.getDay()] + ')';
}

function tatilMi(d) {
  var s = dStr(d);
  var yil = d.getFullYear();
  var tatiller = [
    yil+'-01-01', yil+'-04-23', yil+'-05-01', yil+'-05-19',
    yil+'-07-15', yil+'-08-30', yil+'-10-28', yil+'-10-29'
  ];
  if (yil === 2026) {
    tatiller.push('2026-03-20','2026-03-21','2026-03-22','2026-03-23');
    tatiller.push('2026-05-27','2026-05-28','2026-05-29','2026-05-30');
  }
  for (var i=0; i<tatiller.length; i++) {
    if (tatiller[i] === s) return true;
  }
  return false;
}

function isGunuDegil(d) {
  return d.getDay()===0 || d.getDay()===6 || tatilMi(d);
}

function getListe() {
  var bg = bugun();
  var sonuc = [];
  for (var i=0; i<CACHE.length; i++) {
    try {
      var g = CACHE[i];
      var t = parseD(g.tarih);
      var k = kalanGun(t);
      if (k >= 0 && k <= 90) {
        sonuc.push({tur: g.tur, gun: t, kalan: k, neden: g.uzatma_notu || null});
      }
    } catch(e) {}
  }
  sonuc.sort(function(a,b){ return a.gun - b.gun; });
  return sonuc;
}

var alarmAcik = false;
var alarmTmr = null;

function render() {
  var lst = getListe();
  var bg = bugun();

  var acil = 0, buAy = 0;
  for (var i=0; i<lst.length; i++) {
    if (lst[i].kalan <= 3) acil++;
    if (lst[i].gun.getMonth() === bg.getMonth() && lst[i].gun.getFullYear() === bg.getFullYear()) buAy++;
  }

  document.getElementById('sA').textContent = acil;
  document.getElementById('sB').textContent = buAy;
  var sS = document.getElementById('sS');
  if (lst.length > 0) {
    sS.textContent = lst[0].kalan === 0 ? 'Bugun!' : fmtT(lst[0].gun);
    sS.style.fontSize = '12px';
  } else {
    sS.textContent = '-';
    sS.style.fontSize = '';
  }

  var sAEl = document.getElementById('sA');
  if (acil > 0) {
    sAEl.className = 'sn blink';
    document.getElementById('bnrTxt').textContent = acil + ' acil beyanname! Son 3 gun icinde.';
    document.getElementById('bnr').className = 'bnr show';
    if (alarmAcik) bipSesi();
  } else {
    sAEl.className = 'sn';
    document.getElementById('bnr').className = 'bnr';
  }

  var el = document.getElementById('liste');
  el.innerHTML = '';

  if (lst.length === 0) {
    el.innerHTML = '<div class="bos">Onum\u00fczdeki 90 gunde beyanname yok.</div>';
    return;
  }

  for (var j=0; j<lst.length; j++) {
    var b = lst[j];

    var tarihStr = 'Son gun: ' + fmtT(b.gun);
    var nt = b.neden ? '<div class="nt">i ' + b.neden + '</div>' : '';

    if (b.kalan === 0) {
      div.className = 'k0';
      div.innerHTML = '<div class="badge blink">BUGUN SON GUN!</div><div class="ad">' + b.tur + '</div>' + nt;
    } else if (b.kalan <= 3) {
      div.className = 'k1';
      div.innerHTML = '<div><div class="badge blink">!! ACIL</div><div class="ad">' + b.tur + '</div><div class="tr">' + tarihStr + '</div>' + nt + '</div><div class="sayac"><div class="num blink">' + b.kalan + '</div><div class="lbl">GUN</div></div>';
    } else if (b.kalan <= 7) {
      div.className = 'k2';
      div.innerHTML = '<div><div class="badge">* YAKLASAN</div><div class="ad">' + b.tur + '</div><div class="tr">' + tarihStr + '</div>' + nt + '</div><div class="sayac"><div class="num">' + b.kalan + '</div><div class="lbl">gun</div></div>';
    } else {
      div.className = 'k3';
      div.innerHTML = '<div><div class="ad">' + b.tur + '</div><div class="tr">' + tarihStr + '</div>' + nt + '</div><div class="sayac"><div class="num">' + b.kalan + '</div><div class="lbl">gun</div></div>';
    }
    el.appendChild(div);
  }
}

function bipSesi() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var freqs = [1000, 1500, 2000];
    var times = [0, 0.6, 1.2];
    for (var i=0; i<3; i++) {
      (function(f,t){
        var o = ctx.createOscillator();
        var g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'square'; o.frequency.value = f;
        g.gain.setValueAtTime(0.12, ctx.currentTime + t);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.4);
        o.start(ctx.currentTime + t);
        o.stop(ctx.currentTime + t + 0.45);
      })(freqs[i], times[i]);
    }
  } catch(e) {}
}

function toggleAlarm() {
  alarmAcik = !alarmAcik;

  if (alarmAcik) {
    btn.textContent = String.fromCodePoint(0x1F514);
    btn.className = 'ib aon';
    bipSesi();
  } else {
    btn.textContent = String.fromCodePoint(0x1F515);
    btn.className = 'ib';
    clearInterval(alarmTmr);
  }
}
