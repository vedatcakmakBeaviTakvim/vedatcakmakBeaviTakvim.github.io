<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Beavi">
<meta name="theme-color" content="#0d1b2a">
<title>Beavi – Beyanname Takvimi</title>
<style>
:root{
  --bg:#0d1b2a;--bg2:#0f2133;--kart:#112640;--brd:#1e3a5f;
  --t1:#e8f0fe;--t2:#7a9cc4;--t3:#4a7099;
  --acbg:#1c0f00;--acbar:#ff6b00;--actxt:#ff8c00;
  --ykbg:#0d1e0d;--ykbar:#22c55e;--yktxt:#4ade80;
  --mavi:#3b82f6;--ysl:#22c55e;--kir:#ef4444;
  --sari:#f5c518;--r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{background:var(--bg);color:var(--t1);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100dvh;
  padding-bottom:max(calc(env(safe-area-inset-bottom) + 80px),90px);
  overflow-x:hidden;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:99;background:var(--bg2);
  border-bottom:2px solid var(--brd);
  padding:12px 14px;
  padding-top:max(env(safe-area-inset-top),12px);
  display:flex;align-items:center;justify-content:space-between;gap:10px;}
.lw{display:flex;align-items:center;gap:10px;}
.lb{width:44px;height:44px;flex-shrink:0;}
.lt h1{font-size:18px;font-weight:700;color:var(--t1);line-height:1.25;border-bottom:2px solid #f49e0b;padding-bottom:2px;display:inline-block;}
.lt small{font-size:10px;font-weight:500;color:var(--t2);letter-spacing:0.5px;display:block;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 12px 0;}
.stat{background:var(--kart);border:1px solid var(--brd);border-radius:var(--r);
  padding:13px 8px 11px;text-align:center;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sa::before{background:var(--kir);}.sb::before{background:var(--mavi);}.ss::before{background:var(--ysl);}
.sn{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px;min-height:34px;display:flex;align-items:center;justify-content:center;}
.sa .sn{color:var(--kir);}.sb .sn{color:var(--mavi);}
.ss .sn{color:var(--ysl);font-size:12px;line-height:1.2;word-break:break-word;}
.sl{font-size:8.5px;font-weight:600;letter-spacing:1.4px;color:var(--t3);text-transform:uppercase;}

/* BANNER */
.bnr{display:none;margin:10px 12px 0;background:var(--acbg);border:1px solid var(--acbar);
  border-radius:var(--r);padding:10px 12px;align-items:center;gap:10px;}
.bnr.show{display:flex;}
.bt{flex:1;font-size:12px;color:var(--actxt);font-weight:600;line-height:1.4;}
.bx{background:transparent;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:0 2px;line-height:1;}

/* LIST */
.shdr{display:flex;align-items:center;justify-content:space-between;padding:16px 12px 8px;}
.stitle{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t3);text-transform:uppercase;}
.rbtn{background:transparent;border:1px solid var(--brd);border-radius:18px;color:var(--t2);
  font-size:11px;font-family:inherit;padding:5px 13px;cursor:pointer;}
.liste{padding:0 12px 10px;display:flex;flex-direction:column;gap:7px;}

/* CARDS */
.k0{background:#1a0000;border:1.5px solid #ef4444;border-radius:var(--r);padding:12px 14px;text-align:center;}
.k0 .badge{font-size:10px;font-weight:800;color:#ef4444;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.k0 .ad{font-size:14px;font-weight:700;color:#fca5a5;margin-bottom:2px;}
.k0 .nt{font-size:9px;color:#b45151;font-style:italic;}

.k1{background:var(--acbg);border-left:4px solid var(--acbar);
  border-top:1px solid #2a1500;border-right:1px solid #2a1500;border-bottom:1px solid #2a1500;
  border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.k1 .badge{font-size:9px;font-weight:700;color:var(--actxt);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:3px;}
.k1 .ad{font-size:13px;font-weight:700;color:#ffe0b2;margin-bottom:2px;}
.k1 .tr{font-size:10px;color:#b36000;}.k1 .nt{font-size:9px;color:#8a4e00;margin-top:2px;font-style:italic;}
.k1 .num{font-size:32px;font-weight:900;color:var(--acbar);line-height:1;}
.k1 .lbl{font-size:8px;font-weight:700;color:var(--actxt);letter-spacing:1px;text-transform:uppercase;}
.k1 .sayac{text-align:center;flex-shrink:0;}

.k2{background:var(--ykbg);border-left:3px solid var(--ykbar);
  border-top:1px solid #0a2e0a;border-right:1px solid #0a2e0a;border-bottom:1px solid #0a2e0a;
  border-radius:var(--r);padding:10px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.k2 .badge{font-size:9px;font-weight:700;color:var(--yktxt);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:3px;}
.k2 .ad{font-size:12px;font-weight:700;color:#d1fae5;margin-bottom:2px;}
.k2 .tr{font-size:10px;color:#166534;}.k2 .nt{font-size:9px;color:#0f5132;margin-top:2px;font-style:italic;}
.k2 .num{font-size:26px;font-weight:800;color:var(--yktxt);line-height:1;}
.k2 .lbl{font-size:8px;color:var(--yktxt);letter-spacing:1px;text-transform:uppercase;}
.k2 .sayac{text-align:center;flex-shrink:0;}

.k3{background:var(--kart);border:1px solid var(--brd);border-left:4px solid var(--brd);
  border-radius:var(--r);padding:9px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.k3 .ad{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px;}
.k3 .tr{font-size:10px;color:var(--t3);}.k3 .nt{font-size:9px;color:var(--t3);margin-top:2px;font-style:italic;opacity:.75;}
.k3 .num{font-size:20px;font-weight:700;color:var(--t2);}
.k3 .lbl{font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;}
.k3 .sayac{text-align:center;flex-shrink:0;}

.bos{text-align:center;padding:40px 16px;color:var(--t3);font-size:13px;}

/* BOTTOM NAV — parmak erişimi için aşağıda */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);
  border-top:1px solid var(--brd);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);
  z-index:100;
  min-height:56px;
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;background:transparent;border:none;color:var(--t2);
  font-size:9px;font-family:inherit;letter-spacing:.5px;
  padding:10px 4px;cursor:pointer;
  transition:color .15s;
}
.nb:active{color:var(--t1);}
.nb.aon{color:var(--actxt);}
.nb .ico{font-size:20px;line-height:1;}

/* PWA PROMPT */
.pwa{display:none;position:fixed;bottom:72px;left:12px;right:12px;
  background:var(--bg2);border:1px solid var(--sari);border-radius:14px;
  padding:14px 16px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.6);}
.pwa.show{display:block;}
.pwa h3{font-size:13px;font-weight:700;color:var(--sari);margin-bottom:4px;}
.pwa p{font-size:11px;color:var(--t2);margin-bottom:12px;line-height:1.5;}
.pwa-row{display:flex;gap:8px;}
.pwa-yes{flex:1;background:var(--sari);color:#000;border:none;border-radius:8px;
  padding:11px;font-size:12px;font-weight:700;cursor:pointer;}
.pwa-no{background:transparent;color:var(--t3);border:1px solid var(--brd);
  border-radius:8px;padding:11px 14px;font-size:12px;cursor:pointer;}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.blink{animation:blink 1s ease-in-out infinite;}
</style>
</head>

// Aktif filtreler
var AKTIF_GRUPLAR = null; // null = hepsi
var eDeftSiklik = 'her_ikisi'; // 'aylik', 'yillik', 'her_ikisi'
var eDeftMukTur = 'her_ikisi'; // 'gv', 'kv', 'her_ikisi'

function eDeftFiltrele(g){
  if(g.grup !== 'edefter') return true;
  var tur = g.tur || '';
  var isGV = tur.indexOf('GV') > -1;
  var isKV = tur.indexOf('KV') > -1;
  var isYillik = tur.indexOf('Yillik') > -1 || tur.indexOf('Yıllık') > -1;
  var isAylik = tur.indexOf('Aylik') > -1 || tur.indexOf('Aylık') > -1;
  if(eDeftMukTur === 'gv' && !isGV) return false;
  if(eDeftMukTur === 'kv' && !isKV) return false;
  if(eDeftSiklik === 'aylik' && !isAylik) return false;
  if(eDeftSiklik === 'yillik' && !isYillik) return false;
  return true;
}

function parseD(s){var p=s.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function dStr(d){return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();}
function bugun(){var d=new Date();d.setHours(0,0,0,0);return d;}
function kalanGun(d){return Math.round((d-bugun())/86400000);}
function fmtT(d){return d.getDate()+' '+AYLAR[d.getMonth()]+' ('+GUNLER[d.getDay()]+')';}

function getListe(){
  var bg=bugun();
  var sonuc=[];
  for(var i=0;i<TUMVERI.length;i++){
    try{
      var g=TUMVERI[i];
      if(AKTIF_GRUPLAR && g.grup && AKTIF_GRUPLAR.indexOf(g.grup)===-1) continue;
      if(!eDeftFiltrele(g)) continue;
      var t=parseD(g.tarih);
      var k=kalanGun(t);
      if(k>=0 && k<=180){
        sonuc.push({tur:g.tur,gun:t,kalan:k,neden:g.uzatma_notu||null,kaynak:g.kaynak||'GIB'});
      }
    }catch(e){}
  }
  sonuc.sort(function(a,b){return a.gun-b.gun;});
  return sonuc;
}

var alarmAcik=false;
function alarmToggle(){
  alarmAcik=!alarmAcik;
  var btn=document.getElementById('alarmBtn');
  var lbl=document.getElementById('alarmLbl');
  if(alarmAcik){btn.classList.add('aon');lbl.textContent='Alarm ✓';bipSesi();}
  else{btn.classList.remove('aon');lbl.textContent='Alarm';}
}

function render(){
  var now=new Date();
  var g=GUNLER[now.getDay()];
  document.getElementById('tarihEl').innerHTML=g+'<br>'+now.toLocaleDateString('tr-TR');

  var lst=getListe();
  var bg=bugun();
  var acil=0,bugun0=0,buAy=0;
  for(var i=0;i<lst.length;i++){
    if(lst[i].kalan===0) bugun0++;
    else if(lst[i].kalan<=3) acil++;
    if(lst[i].gun.getMonth()===bg.getMonth()&&lst[i].gun.getFullYear()===bg.getFullYear()) buAy++;
  }
  document.getElementById('sA').textContent=acil;
  document.getElementById('sB').textContent=buAy;
  var sS=document.getElementById('sS');
  if(lst.length>0){sS.textContent=lst[0].kalan===0?'Bugün!':fmtT(lst[0].gun);}
  else{sS.textContent='-';}

  var sAEl=document.getElementById('sA');
  document.getElementById('sA').textContent=acil;
  if(bugun0>0 || acil>0){
    sAEl.className='sn blink';
    var mesaj='';
    if(bugun0>0 && acil>0) mesaj=bugun0+' beyanname bugün son gün! '+acil+' beyanname 3 gün içinde.';
    else if(bugun0>0) mesaj=bugun0+' beyanname bugün son gün!';
    else mesaj=acil+' acil beyanname var! '+acil+' gün veya daha az kaldı.';
    document.getElementById('bnrTxt').textContent=mesaj;
    document.getElementById('bnr').className='bnr show';
    if(alarmAcik) bipSesi();
  }else{sAEl.className='sn';document.getElementById('bnr').className='bnr';}

  var el=document.getElementById('liste');
  el.innerHTML='';
  if(lst.length===0){el.innerHTML='<div class="bos">Önümüzdeki 180 günde beyanname yok.</div>';return;}

  for(var j=0;j<lst.length;j++){
    var b=lst[j];
    var div=document.createElement('div');
    var tStr='Son gün: '+fmtT(b.gun);
    var kayBadge=b.kaynak==='SGK'?'<span style="font-size:9px;background:#1e3a5f;color:#7a9cc4;border-radius:4px;padding:1px 5px;margin-left:5px">SGK</span>':'';
    var nt=b.neden?'<div class="nt">ℹ '+b.neden+'</div>':'';

    if(b.kalan===0){
      div.className='k0';
      div.innerHTML='<div class="badge blink">BUGÜN SON GÜN!</div><div class="ad">'+b.tur+kayBadge+'</div>'+nt;
    }else if(b.kalan<=3){
      div.className='k1';
      div.innerHTML='<div><div class="badge blink">!! ACİL</div><div class="ad">'+b.tur+kayBadge+'</div><div class="tr">'+tStr+'</div>'+nt+'</div><div class="sayac"><div class="num blink">'+b.kalan+'</div><div class="lbl">GÜN</div></div>';
    }else if(b.kalan<=7){
      div.className='k2';
      div.innerHTML='<div><div class="badge">★ YAKLASAN</div><div class="ad">'+b.tur+kayBadge+'</div><div class="tr">'+tStr+'</div>'+nt+'</div><div class="sayac"><div class="num">'+b.kalan+'</div><div class="lbl">gün</div></div>';
    }else{
      div.className='k3';
      div.innerHTML='<div><div class="ad">'+b.tur+kayBadge+'</div><div class="tr">'+tStr+'</div>'+nt+'</div><div class="sayac"><div class="num">'+b.kalan+'</div><div class="lbl">gün</div></div>';
    }
    el.appendChild(div);
  }
}

function bipSesi(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [800,1200,1600].forEach(function(f,i){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;
      g.gain.setValueAtTime(0.1,ctx.currentTime+i*0.3);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.3+0.25);
      o.start(ctx.currentTime+i*0.3);o.stop(ctx.currentTime+i*0.3+0.3);
    });
  }catch(e){}
}

  overlay.onclick=function(e){if(e.target===overlay) overlay.remove();};
}

// PWA
var pwaDeferred=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();pwaDeferred=e;
  try{if(!localStorage.getItem('pwa_red'))
    setTimeout(function(){document.getElementById('pwaEl').classList.add('show');},2500);}
  catch(e){}
});
function pwaKur(){
  document.getElementById('pwaEl').classList.remove('show');
  if(pwaDeferred){pwaDeferred.prompt();pwaDeferred=null;}
  else alert('iPhone: Safari\'de aç → Paylaş (□↑) → "Ana Ekrana Ekle"');
}
function pwaRed(){
  document.getElementById('pwaEl').classList.remove('show');
  try{localStorage.setItem('pwa_red','1');}catch(e){}
}
// iOS
if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone){
  try{if(!localStorage.getItem('pwa_red'))
    setTimeout(function(){document.getElementById('pwaEl').classList.add('show');},3000);}
  catch(e){}
}

// Ensure DOM is ready before render
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', function(){render();});
} else {
  render();
}
setInterval(render,3600000);
</script>
</body>
