<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d1b2a;color:#e8f0fe;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;padding-bottom:20px}
.hdr{background:#0f2133;border-bottom:2px solid #1e3a5f;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.lw{display:flex;align-items:center;gap:10px}
.lb{width:44px;height:44px;flex-shrink:0}
.lt h1{font-size:18px;font-weight:700;line-height:1.2;border-bottom:2px solid #f49e0b;padding-bottom:2px;display:inline-block}
.lt small{font-size:10px;color:#7a9cc4;display:block;margin-top:2px}
.hbs{display:flex;gap:8px}
.ib{width:36px;height:36px;border-radius:18px;border:1px solid #1e3a5f;background:transparent;color:#7a9cc4;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 12px 0}
.stat{background:#112640;border:1px solid #1e3a5f;border-radius:12px;padding:13px 8px 11px;text-align:center;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sa::before{background:#ef4444}.sb::before{background:#3b82f6}.ss::before{background:#22c55e}
.sn{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px;display:flex;align-items:center;justify-content:center;min-height:34px}
.sa .sn{color:#ef4444}.sb .sn{color:#3b82f6}.ss .sn{color:#22c55e;font-size:12px;line-height:1.3}
.sl{font-size:8.5px;font-weight:600;letter-spacing:1.4px;color:#4a7099;text-transform:uppercase}
.bnr{display:none;margin:10px 12px 0;background:#1c0f00;border:1px solid #ff6b00;border-radius:12px;padding:10px 12px;align-items:center;gap:10px}
.bnr.show{display:flex}
.bt{flex:1;font-size:12px;color:#ff8c00;font-weight:600}
.bx{background:transparent;border:none;color:#4a7099;font-size:20px;cursor:pointer;padding:0 2px}
.shdr{display:flex;align-items:center;justify-content:space-between;padding:16px 12px 8px}
.stitle{font-size:10px;font-weight:700;letter-spacing:2px;color:#4a7099;text-transform:uppercase}
.rbtn{background:transparent;border:1px solid #1e3a5f;border-radius:18px;color:#7a9cc4;font-size:11px;font-family:inherit;padding:5px 13px;cursor:pointer}
.liste{padding:0 12px 20px;display:flex;flex-direction:column;gap:7px}
.k0{background:#1a0000;border:1.5px solid #ef4444;border-radius:12px;padding:12px 14px;text-align:center}
.k0 .badge{font-size:10px;font-weight:800;color:#ef4444;letter-spacing:2px;margin-bottom:4px}
.k0 .ad{font-size:14px;font-weight:700;color:#fca5a5}
.k1{background:#1c0f00;border-left:4px solid #ff6b00;border-top:1px solid #2a1500;border-right:1px solid #2a1500;border-bottom:1px solid #2a1500;border-radius:12px;padding:11px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.k1 .badge{font-size:9px;font-weight:700;color:#ff8c00;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:3px}
.k1 .ad{font-size:13px;font-weight:700;color:#ffe0b2;margin-bottom:2px}
.k1 .tr{font-size:10px;color:#b36000}
.k1 .nt{font-size:9px;color:#8a4e00;margin-top:2px;font-style:italic}
.k1 .num{font-size:32px;font-weight:900;color:#ff6b00;line-height:1}
.k1 .lbl{font-size:8px;font-weight:700;color:#ff8c00;letter-spacing:1px;text-transform:uppercase}
.k1 .sayac{text-align:center;flex-shrink:0}
.k2{background:#0d1e0d;border-left:3px solid #22c55e;border-top:1px solid #0a2e0a;border-right:1px solid #0a2e0a;border-bottom:1px solid #0a2e0a;border-radius:12px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.k2 .badge{font-size:9px;font-weight:700;color:#4ade80;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:3px}
.k2 .ad{font-size:12px;font-weight:700;color:#d1fae5;margin-bottom:2px}
.k2 .tr{font-size:10px;color:#166534}
.k2 .nt{font-size:9px;color:#0f5132;margin-top:2px;font-style:italic}
.k2 .num{font-size:26px;font-weight:800;color:#4ade80;line-height:1}
.k2 .lbl{font-size:8px;color:#4ade80;letter-spacing:1px;text-transform:uppercase}
.k2 .sayac{text-align:center;flex-shrink:0}
.k3{background:#112640;border:1px solid #1e3a5f;border-left:4px solid #1e3a5f;border-radius:12px;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.k3 .ad{font-size:12px;font-weight:600;color:#e8f0fe;margin-bottom:2px}
.k3 .tr{font-size:10px;color:#4a7099}
.k3 .nt{font-size:9px;color:#4a7099;margin-top:2px;font-style:italic;opacity:.75}
.k3 .num{font-size:20px;font-weight:700;color:#7a9cc4}
.k3 .lbl{font-size:8px;color:#4a7099;letter-spacing:1px;text-transform:uppercase}
.k3 .sayac{text-align:center;flex-shrink:0}
.bos{text-align:center;padding:40px 16px;color:#4a7099;font-size:13px}
.edefter{border-left-color:#f5c518!important;background:#1a1600!important;}
.edefter .ad{color:#fde68a!important;}
.edefter .num{color:#f5c518!important;}
.edefter .tr{color:#a07c00!important;}
.edefter .badge{color:#f5c518!important;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.blink{animation:blink 1s ease-in-out infinite}
</style>
</head>

var alarmAcik = false;

function parseD(tarihStr) {
  var AYLAR2 = {"Oca":0,"Sub":1,"Mar":2,"Nis":3,"May":4,"Haz":5,"Tem":6,"Agu":7,"Eyl":8,"Eki":9,"Kas":10,"Ara":11};
  if (!tarihStr) return null;
  var m = tarihStr.match(/^(\d+) (\w+)/);
  if (!m) return null;
  var gun = parseInt(m[1]);
  var ay = AYLAR2[m[2]];
  if (ay === undefined) return null;
  var yil = new Date().getFullYear();
  return new Date(yil, ay, gun);
}


function getListe() {
  var ayar = edAyarOku();
  var sonuc = [];
  for (var i = 0; i < DATA.length; i++) {
    var item = DATA[i];
    var tur = item[2];
    if (tur.indexOf('e-Defter') === 0) {
      if (!ayar.aktif) continue;
      var itemTip = item[4] || '';
      var itemMuk = item[5] || '';
      if (ayar.tip !== 'hepsi' && itemTip !== ayar.tip) continue;
      if (ayar.mukellef !== 'hepsi' && itemMuk !== ayar.mukellef) continue;
    }
    sonuc.push(item);
  }
  sonuc.sort(function(a,b){return a[0]-b[0];});
  return sonuc;
}

function render() {
  var lst = getListe();
  var bg = new Date(); bg.setHours(0,0,0,0);
  var acil = 0, buAy = 0;
  for (var i=0; i<lst.length; i++) {
    if (lst[i][0] <= 3) acil++;
    var t = parseD(lst[i][1]);
    if (t && t.getMonth() === bg.getMonth() && t.getFullYear() === bg.getFullYear()) buAy++;
  }
  document.getElementById('sA').textContent = acil;
  document.getElementById('sB').textContent = buAy;
  var sS = document.getElementById('sS');
  if (lst.length > 0) {
    sS.textContent = lst[0][0] === 0 ? 'Bugun!' : lst[0][1];
    sS.style.fontSize = '12px';
  } else {
    sS.textContent = '-';
    sS.style.fontSize = '';
  }
  var sAEl = document.getElementById('sA');
  if (acil > 0) {
    sAEl.className = 'sn blink';
    document.getElementById('bnrTxt').textContent = acil + ' acil! Son 3 gun icinde.';
    document.getElementById('bnr').className = 'bnr show';
    if (alarmAcik) bipSesi();
  } else {
    sAEl.className = 'sn';
    document.getElementById('bnr').className = 'bnr';
  }
  var el = document.getElementById('liste');
  el.innerHTML = '';
  if (lst.length === 0) {
    el.innerHTML = '<div class="bos">Onumuzdeki 90 gunde gorev yok.</div>';
    return;
  }
  for (var j=0; j<lst.length; j++) {
    var item = lst[j];
    var k = item[0];
    var tarihStr = item[1];
    var tur = item[2];
    var neden = item[3];
    var isEdefter = tur.indexOf('e-Defter') === 0;
    var div = document.createElement('div');
    var ntHtml = neden ? '<div class="nt">i ' + neden + '</div>' : '';
    if (k === 0) {
      div.className = isEdefter ? 'k0 edefter' : 'k0';
      div.innerHTML = '<div class="badge blink">BUGUN SON GUN!</div><div class="ad">' + tur + '</div>' + ntHtml;
    } else if (k <= 3) {
      div.className = isEdefter ? 'k1 edefter' : 'k1';
      div.innerHTML = '<div><div class="badge blink">!! ACIL</div><div class="ad">' + tur + '</div><div class="tr">Son gun: ' + tarihStr + '</div>' + ntHtml + '</div><div class="sayac"><div class="num blink">' + k + '</div><div class="lbl">GUN</div></div>';
    } else if (k <= 7) {
      div.className = isEdefter ? 'k2 edefter' : 'k2';
      div.innerHTML = '<div><div class="badge">* YAKLASAN</div><div class="ad">' + tur + '</div><div class="tr">Son gun: ' + tarihStr + '</div>' + ntHtml + '</div><div class="sayac"><div class="num">' + k + '</div><div class="lbl">gun</div></div>';
    } else {
      div.className = isEdefter ? 'k3 edefter' : 'k3';
      div.innerHTML = '<div><div class="ad">' + tur + '</div><div class="tr">Son gun: ' + tarihStr + '</div>' + ntHtml + '</div><div class="sayac"><div class="num">' + k + '</div><div class="lbl">gun</div></div>';
    }
    el.appendChild(div);
  }
}

function toggleAlarm() {
  alarmAcik = !alarmAcik;
  var btn = document.getElementById('alarmBtn');
  btn.style.borderColor = alarmAcik ? '#ff6b00' : '#1e3a5f';
  btn.style.color = alarmAcik ? '#ff8c00' : '#7a9cc4';
  if (alarmAcik) {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.1, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o.start(); o.stop(ctx.currentTime + 0.3);
    } catch(e) {}
  } else {
    clearInterval(alarmTimer);
  }
}

// e-Defter ayar: localStorage'dan oku
function edAyarOku() {
  try {
    var v = localStorage.getItem('beavi_edefter');
    return v ? JSON.parse(v) : {aktif: false, tip: 'ucaylik', mukellef: 'hepsi'};
  } catch(e) { return {aktif: false, tip: 'ucaylik', mukellef: 'hepsi'}; }
}
function edAyarKaydet(ayar) {
  try { localStorage.setItem('beavi_edefter', JSON.stringify(ayar)); } catch(e) {}
}
